<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>📱 Вернись в 2007-й</title>

  <!-- Telegram Mini App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    /* ── Базовый сброс ───────────────────────────────────────── */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: "Courier New", "Lucida Console", monospace;
      background: linear-gradient(160deg, #0a1929 0%, #0f2a3f 55%, #0a1929 100%);
      color: #cfe8ff;
      min-height: 100%;
      display: flex;
      justify-content: center;
      padding: 14px 12px 28px;
      overflow-x: hidden;
    }

    /* ── Корпус «телефона» ──────────────────────────────────── */
    .phone {
      width: 100%;
      max-width: 420px;
      background: linear-gradient(180deg, #3a4654 0%, #232c36 100%);
      border-radius: 22px;
      padding: 14px;
      box-shadow: 0 18px 40px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.12);
      border: 1px solid #4a5664;
    }

    .brand {
      text-align: center;
      font-size: 11px;
      letter-spacing: 3px;
      color: #9fb2c4;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    /* ── LCD-экран (как на старом телефоне) ─────────────────── */
    .screen {
      background: #0c1a0c;
      border: 4px solid #1a2a1a;
      border-radius: 10px;
      padding: 14px;
      box-shadow: inset 0 0 22px rgba(0,0,0,.7), inset 0 0 0 2px #0a130a;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }
    .lcd-title {
      color: #7CFC00;
      font-size: 15px;
      text-shadow: 0 0 6px rgba(124,252,0,.55);
      text-align: center;
      letter-spacing: 1px;
    }
    .lcd-status {
      color: #9fe870;
      font-size: 12px;
      text-shadow: 0 0 5px rgba(124,252,0,.45);
      text-align: center;
      min-height: 16px;
      line-height: 1.4;
    }
    .lcd-signal {
      display: flex; justify-content: space-between;
      color: #4a7a3a; font-size: 10px;
      border-top: 1px dashed #2a4a2a; padding-top: 6px; margin-top: auto;
    }

    /* ── Прогресс-бар ────────────────────────────────────────── */
    .progress-wrap {
      display: none;
      flex-direction: column; gap: 5px; margin-top: 4px;
    }
    .progress-wrap.active { display: flex; }
    .progress-bar {
      height: 14px; border: 1px solid #2a4a2a; background: #06100a;
      border-radius: 3px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; width: 0%;
      background: repeating-linear-gradient(45deg, #7CFC00 0 6px, #5fd400 6px 12px);
      transition: width .25s linear;
    }
    .progress-pct { color: #9fe870; font-size: 11px; text-align: center; }

    /* ── Кнопки в стиле «навигационный блок» ─────────────────── */
    .btn {
      width: 100%;
      display: block;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-weight: bold;
      padding: 14px 12px;
      border-radius: 10px;
      font-size: 14px;
      letter-spacing: .5px;
      transition: transform .05s ease, filter .15s ease;
      background: linear-gradient(180deg, #2c6fb0 0%, #124b8c 100%);
      color: #fff;
      box-shadow: 0 3px 0 #0a3361, 0 6px 14px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.25);
    }
    .btn:active { transform: translateY(3px); box-shadow: 0 0 0 #0a3361, 0 2px 6px rgba(0,0,0,.4); }
    .btn:disabled { filter: grayscale(.7) brightness(.6); cursor: not-allowed; box-shadow: none; transform: none; }
    .btn.secondary { background: linear-gradient(180deg,#4a5664 0%,#2c3640 100%); box-shadow: 0 3px 0 #1a232c, 0 6px 14px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.2); }
    .btn.amber { background: linear-gradient(180deg,#ff9d2e 0%,#e0701a 100%); box-shadow: 0 3px 0 #9c4a0c, 0 6px 14px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.3); }
    .btn + .btn { margin-top: 10px; }

    /* ── Пресеты качества ────────────────────────────────────── */
    .presets { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 14px; }
    .preset {
      border: 2px solid #3a4654; background: #1a232c; color: #9fb2c4;
      font-family: inherit; font-size: 11px; font-weight: bold;
      padding: 10px 4px; border-radius: 8px; cursor: pointer; line-height: 1.3;
      transition: all .15s ease;
    }
    .preset small { display:block; font-weight:normal; opacity:.7; font-size:9px; margin-top:3px;}
    .preset.active { border-color: #7CFC00; color: #7CFC00; background: #0c1a0c; box-shadow: 0 0 10px rgba(124,252,0,.25);}

    /* ── Превью / результат ──────────────────────────────────── */
    .filename { font-size: 11px; color: #9fb2c4; text-align:center; word-break: break-all; margin-bottom: 10px; min-height: 14px;}
    .result-wrap { display:none; margin-top: 14px; }
    .result-wrap.active { display:block; }
    .result-video {
      width: 100%; border-radius: 10px; border: 3px solid #4a5664; background:#000;
      box-shadow: inset 0 0 20px rgba(0,0,0,.7);
    }
    .result-actions { display:grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .result-actions .btn { margin-top: 0; }

    .warn { font-size: 10px; color: #ffb380; text-align:center; margin-top: 12px; line-height: 1.4;}
    .hidden-input { display: none; }
    .spinner { display:inline-block; width:12px; height:12px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right:6px;}
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="phone">
    <div class="brand">📱 SHAKAL · 2007 EDITION</div>

    <!-- LCD-экран -->
    <div class="screen">
      <div class="lcd-title" id="lcdTitle">ВЕРНИСЬ В 2007-Й</div>
      <div class="lcd-status" id="lcdStatus">Выбери видео и верни его в эпоху пикселей</div>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-pct" id="progressPct">0%</div>
      </div>
      <div class="lcd-signal">
        <span>🔋 ●●●○○</span>
        <span id="lcdClock">--:--</span>
        <span>📶 TMA</span>
      </div>
    </div>

    <!-- Пресеты качества -->
    <div class="presets">
      <button class="preset active" data-preset="q_2007">📱 2007<small>176×144</small></button>
      <button class="preset" data-preset="q_brick">📟 BRICK<small>128×96</small></button>
      <button class="preset" data-preset="q_2010">📺 2010<small>320×240</small></button>
    </div>

    <div class="filename" id="filename">—</div>

    <input type="file" id="fileInput" class="hidden-input" accept="video/*" />
    <label for="fileInput" class="btn secondary" id="pickBtn">📁 Выбрать видео</label>
    <button class="btn amber" id="processBtn" disabled>🔧 Сделать шакально</button>

    <!-- Результат -->
    <div class="result-wrap" id="resultWrap">
      <video class="result-video" id="resultVideo" autoplay loop muted playsinline controls></video>
      <div class="result-actions">
        <button class="btn" id="downloadBtn">💾 Скачать</button>
        <button class="btn secondary" id="shareBtn">📤 В чат</button>
      </div>
      <button class="btn secondary" id="againBtn" style="margin-top:10px;">🔄 Ещё одно видео</button>
    </div>

    <div class="warn" id="warn">
      ⚠️ Первая обработка грузит движок (~25 МБ). Длинные ролики обрабатываются долго — телефон делает всю работу сам.
    </div>
  </div>

  <!-- ffmpeg.wasm и util грузятся динамически из JS со своего хостинга
       (папка vendor/, см. ниже VENDOR_BASE) — без сторонних CDN. -->

  <script>
  (function () {
    "use strict";

    // ── Загрузка ffmpeg.wasm со своего хостинга (НЕ с CDN) ────
    // ВАЖНО: unpkg.com и cdn.jsdelivr.net недоступны из РФ (блокировка
    // на уровне провайдера), поэтому раньше тут была CDN-логика с
    // fallback — она не помогала, потому что блокировка не зависит от
    // конкретного CDN-домена. Решение: файлы ffmpeg.wasm лежат рядом с
    // index.html (папка vendor/) и грузятся с того же хоста, что и сама
    // страница — никакого стороннего CDN не остаётся в цепочке.
    //
    // Состав папки vendor/ (должна лежать рядом с этим index.html):
    //   vendor/ffmpeg.js              — из @ffmpeg/ffmpeg, dist/umd/ffmpeg.js
    //   vendor/814.ffmpeg.js          — ОБЯЗАТЕЛЬНО рядом! это чанк-файл,
    //                                   который ffmpeg.js подгружает сам
    //                                   (webpack разбил UMD-сборку на 2 файла)
    //   vendor/ffmpeg-util.js         — из @ffmpeg/util, dist/umd/index.js
    //   vendor/ffmpeg-core.js         — из @ffmpeg/core, dist/umd/ffmpeg-core.js
    //   vendor/ffmpeg-core.wasm.part00 — 1-я часть движка (см. WASM_PARTS ниже)
    //   vendor/ffmpeg-core.wasm.part01 — 2-я часть движка
    //   (сам .wasm весит ~31 МБ — больше лимита GitHub на загрузку файла
    //   через веб-форму, 25 МБ, поэтому он разбит на 2 части поменьше и
    //   склеивается обратно в браузере — см. loadWasmFromParts ниже)
    const VENDOR_BASE = "vendor"; // относительный путь от index.html

    function loadScript(url, timeoutMs = 20000) {
      return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        let done = false;
        const timer = setTimeout(() => {
          if (done) return;
          done = true;
          s.remove();
          reject(new Error("Таймаут (" + (timeoutMs / 1000) + "с): " + url));
        }, timeoutMs);
        s.src = url;
        s.onload = () => {
          if (done) return;
          done = true;
          clearTimeout(timer);
          resolve(url);
        };
        s.onerror = () => {
          if (done) return;
          done = true;
          clearTimeout(timer);
          reject(new Error("Файл не найден: " + url + " (проверь, что папка vendor/ загружена на хостинг рядом с index.html)"));
        };
        document.head.appendChild(s);
      });
    }

    // Промис, который резолвится, когда обе библиотеки точно в window.
    const ffmpegLibsLoaded = (async () => {
      setStatusSafe('<span class="spinner"></span>Загружаю ffmpeg.js...');
      await loadScript(`${VENDOR_BASE}/ffmpeg.js`);
      setStatusSafe('<span class="spinner"></span>Загружаю util.js...');
      await loadScript(`${VENDOR_BASE}/ffmpeg-util.js`);
    })();
    ffmpegLibsLoaded.catch((err) => {
      console.error("Не удалось загрузить библиотеки ffmpeg.wasm:", err);
      // Не показываем ошибку сразу на экране — попробуем ещё раз
      // лениво при нажатии «Сделать шакально» (см. ensureFFmpeg).
    });

    // setStatus определена ниже после DOM-привязок; на случай если этот
    // код выполнится раньше — безопасная обёртка без падения.
    function setStatusSafe(html) {
      const el = document.getElementById("lcdStatus");
      if (el) el.innerHTML = html;
    }



    // ── Telegram WebApp ───────────────────────────────────────
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
    if (tg) { tg.expand(); tg.ready && tg.ready(); }

    // ── Диагностика: показываем любую неотловленную ошибку на LCD-экране ──
    // Без этого скрипт может "молча" падать (например, если CDN с ffmpeg.wasm
    // не успел отдать библиотеку), и пользователь просто не видит реакции
    // после выбора файла — кнопка-то нативная, а вот обработка уже на JS.
    window.addEventListener("error", (e) => {
      const el = document.getElementById("lcdStatus");
      if (el) el.innerHTML = "❌ Скрипт упал: " + (e.message || "неизвестная ошибка");
      console.error("Global error:", e.error || e.message);
    });
    window.addEventListener("unhandledrejection", (e) => {
      const el = document.getElementById("lcdStatus");
      const msg = (e.reason && e.reason.message) ? e.reason.message : String(e.reason);
      if (el) el.innerHTML = "❌ Ошибка: " + msg;
      console.error("Unhandled rejection:", e.reason);
    });

    // Часы на «экране» для атмосферы
    function tick() {
      const d = new Date();
      const z = n => String(n).padStart(2, "0");
      const el = document.getElementById("lcdClock");
      if (el) el.textContent = z(d.getHours()) + ":" + z(d.getMinutes());
    }
    tick(); setInterval(tick, 30000);

    // ── DOM ───────────────────────────────────────────────────
    const $ = id => document.getElementById(id);
    const lcdStatus = $("lcdStatus"), lcdTitle = $("lcdTitle");
    const progressWrap = $("progressWrap"), progressFill = $("progressFill"), progressPct = $("progressPct");
    const fileInput = $("fileInput"), pickBtn = $("pickBtn"), processBtn = $("processBtn");
    const filenameEl = $("filename"), resultWrap = $("resultWrap"), resultVideo = $("resultVideo");
    const downloadBtn = $("downloadBtn"), shareBtn = $("shareBtn"), againBtn = $("againBtn");

    function setStatus(t) { lcdStatus.innerHTML = t; }
    function setTitle(t) { lcdTitle.textContent = t; }
    function setProgress(p) {
      const pct = Math.max(0, Math.min(100, Math.round(p * 100)));
      progressFill.style.width = pct + "%";
      progressPct.textContent = pct + "%";
    }

    // ── Пресеты (значения = те, что в Python-боте) ────────────
    // Порядок фильтров оптимизирован: scale → eq → noise (на крошечном кадре — быстро).
    const PRESETS = {
      q_brick: {
        title: "📟 Brick 2003",
        args: ["-vf", "scale=128:96:flags=neighbor,eq=contrast=1.5:brightness=0.15:saturation=1.7,noise=c0s=45:c1s=55:allf=t",
               "-r", "8", "-c:v", "libx264", "-b:v", "40k", "-preset", "ultrafast", "-pix_fmt", "yuv420p",
               "-ac", "1", "-ar", "8000", "-c:a", "aac", "-b:a", "12k"]
      },
      q_2007: {
        title: "📱 2007 (классика)",
        // ИСХОДНЫЙ фильтр из ТЗ, оптимизированный по порядку:
        // eq=contrast=1.4:brightness=0.15:saturation=1.6, scale=176:144:flags=neighbor, noise=c0s=30:c1s=40:allf=t
        args: ["-vf", "scale=176:144:flags=neighbor,eq=contrast=1.4:brightness=0.15:saturation=1.6,noise=c0s=30:c1s=40:allf=t",
               "-r", "10", "-c:v", "libx264", "-b:v", "70k", "-preset", "veryfast", "-pix_fmt", "yuv420p",
               "-ac", "1", "-ar", "8000", "-c:a", "aac", "-b:a", "16k"]
      },
      q_2010: {
        title: "📺 2010",
        args: ["-vf", "scale=320:240:flags=neighbor,eq=contrast=1.25:brightness=0.1:saturation=1.4,noise=c0s=20:c1s=25:allf=t",
               "-r", "15", "-c:v", "libx264", "-b:v", "150k", "-preset", "veryfast", "-pix_fmt", "yuv420p",
               "-ac", "1", "-ar", "8000", "-c:a", "aac", "-b:a", "24k"]
      }
    };
    let currentPreset = "q_2007";

    document.querySelectorAll(".preset").forEach(b => {
      b.addEventListener("click", () => {
        document.querySelectorAll(".preset").forEach(x => x.classList.remove("active"));
        b.classList.add("active");
        currentPreset = b.dataset.preset;
      });
    });

    // ── ffmpeg.wasm ───────────────────────────────────────────
    // ВАЖНО: не деструктурируем глобалы на этапе загрузки скрипта.
    // Если CDN ещё не успел отдать/выполнить ffmpeg.js или util.js
    // (медленная сеть, временный сбой unpkg, кеш WebView и т.п.),
    // обращение к FFmpegWASM/FFmpegUtil здесь бросает ReferenceError
    // СРАЗУ при разборе всего <script> — и тогда НИ ОДИН обработчик
    // в файле не навешивается, включая fileInput "change".
    // Поэтому проверяем их наличие лениво, внутри ensureFFmpeg().
    // ВАЖНО: core-файлы (ffmpeg-core.js/.wasm) тоже лежат в vendor/ —
    // см. константу VENDOR_BASE и комментарий выше про состав папки.
    //
    // ffmpeg-core.wasm весит ~31 МБ — это больше лимита GitHub на загрузку
    // файла через веб-форму (25 МБ). Поэтому сам .wasm разбит на части
    // (ffmpeg-core.wasm.part00, .part01 — каждая < 25 МБ) и собирается
    // обратно в браузере через fetch + конкатенацию ArrayBuffer, прежде
    // чем передать его в ffmpeg.load(). Если понадобится больше частей —
    // просто добавь их имена в массив WASM_PARTS ниже.
    const WASM_PARTS = ["ffmpeg-core.wasm.part00", "ffmpeg-core.wasm.part01"];

    async function loadWasmFromParts(basePathIgnored) {
      const buffers = [];
      let totalLen = 0;
      for (const partName of WASM_PARTS) {
        const url = `${VENDOR_BASE}/${partName}`;
        const res = await fetch(url);
        if (!res.ok) {
          throw new Error(`Не удалось скачать часть wasm-файла: ${url} (HTTP ${res.status})`);
        }
        const buf = await res.arrayBuffer();
        buffers.push(buf);
        totalLen += buf.byteLength;
      }
      // Склеиваем все части в один непрерывный буфер.
      const merged = new Uint8Array(totalLen);
      let offset = 0;
      for (const buf of buffers) {
        merged.set(new Uint8Array(buf), offset);
        offset += buf.byteLength;
      }
      const blob = new Blob([merged], { type: "application/wasm" });
      return URL.createObjectURL(blob);
    }

    let ffmpeg = null;
    let ffmpegReady = false;
    let fetchFile = null;

    async function ensureFFmpeg() {
      if (ffmpegReady) return ffmpeg;

      setStatus('<span class="spinner"></span>Загружаю движок FFmpeg (~25 МБ, один раз)...');
      processBtn.disabled = true;

      // Ждём результат фоновой загрузки скриптов, начатой при старте страницы.
      // Если она ещё не завершилась — подождём её здесь; если упала —
      // пробуем загрузить ещё раз (например, первая попытка совпала с
      // моментом, когда WebView ещё не успел открыть локальные ресурсы).
      let lastLoadErr = null;
      try {
        await ffmpegLibsLoaded;
      } catch (_) {
        setStatus('<span class="spinner"></span>Повторная попытка загрузки движка...');
        try {
          await loadScript(`${VENDOR_BASE}/ffmpeg.js`);
          await loadScript(`${VENDOR_BASE}/ffmpeg-util.js`);
        } catch (err) {
          lastLoadErr = err;
        }
      }

      if (typeof FFmpegWASM === "undefined" || typeof FFmpegUtil === "undefined") {
        const reason = lastLoadErr ? lastLoadErr.message : "библиотеки не определены после загрузки";
        throw new Error(
          "Не загрузился движок FFmpeg: " + reason + ". " +
          "Проверь, что папка vendor/ (с файлами ffmpeg.js, 814.ffmpeg.js, " +
          "ffmpeg-util.js, ffmpeg-core.js, ffmpeg-core.wasm.part00, " +
          "ffmpeg-core.wasm.part01) загружена на хостинг рядом с index.html. " +
          "Открывать страницу напрямую с диска (file://) не получится — " +
          "нужен HTTP(S)-хостинг (например, GitHub Pages)."
        );
      }
      const { FFmpeg } = FFmpegWASM;
      ({ fetchFile } = FFmpegUtil);
      const { toBlobURL } = FFmpegUtil;

      ffmpeg = new FFmpeg();
      // Прогресс с этапа загрузки ядра не привязан — используем «log» как индикатор жизни.
      ffmpeg.on("log", ({ message }) => {
        // Показываем короткие строки лога, чтобы экран «жил».
        if (message && message.length < 60) setStatus("⚙️ " + message);
      });

      let coreURL, wasmURL;
      try {
        coreURL = await toBlobURL(`${VENDOR_BASE}/ffmpeg-core.js`, "text/javascript");
        wasmURL = await loadWasmFromParts(`${VENDOR_BASE}/ffmpeg-core.wasm`);
      } catch (err) {
        console.error(err);
        throw new Error(
          "Не удалось загрузить ffmpeg-core.js/.wasm из папки vendor/. " +
          "Проверь, что все файлы (включая .part00/.part01) загружены на хостинг рядом с index.html."
        );
      }


      await ffmpeg.load({ coreURL, wasmURL });
      ffmpegReady = true;
      return ffmpeg;
    }

    // ── Выбор файла ───────────────────────────────────────────
    let selectedFile = null;
    let selectedDuration = 0;

    // Кнопка выбора файла реализована как <label for="fileInput"> — это нативный
    // браузерный механизм, который надёжно открывает системный выбор файла
    // на iOS/Android внутри Telegram WebView (где программный .click() часто
    // блокируется). Поэтому тут НЕТ обработчика клика на pickBtn.

    fileInput.addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;

      // Лимит размера
      const MAX_BYTES = 100 * 1024 * 1024; // 100 МБ
      if (file.size > MAX_BYTES) {
        setStatus("❌ Файл слишком большой (лимит 100 МБ).");
        return;
      }

      selectedFile = file;
      const mbSize = (file.size / (1024 * 1024)).toFixed(1);
      filenameEl.textContent = "🎬 " + file.name + "  ·  " + mbSize + " МБ";
      
      processBtn.disabled = false;
      resultWrap.classList.remove("active");
      setStatus("Готово к обработке. Жми «Сделать шакально» 🔧");
    });

    // ── Обработка ─────────────────────────────────────────────
    processBtn.addEventListener("click", async () => {
      if (!selectedFile) return;
      resultWrap.classList.remove("active");
      progressWrap.classList.add("active");
      setProgress(0);
      setTitle("ПРЕВРАЩАЮ В ПИКСЕЛИ");

      try {
        const ff = await ensureFFmpeg();

        setStatus("📥 Читаю файл...");
        const inName = "input" + getExt(selectedFile.name);
        const outName = "output.mp4";
        await ff.writeFile(inName, await fetchFile(selectedFile));

        // Прогресс привязан к обработке (0..1).
        const progressHandler = ({ progress }) => setProgress(progress);
        ff.on("progress", progressHandler);

        setStatus("⚙️ Кодирую... телефон старается изо всех сил");

        // Сборка аргументов: -i input + пресет + output
        const args = ["-i", inName].concat(PRESETS[currentPreset].args).concat([outName]);
        await ff.exec(args);

        ff.off("progress", progressHandler);
        setProgress(1);

        setStatus("📦 Читаю результат...");
        const data = await ff.readFile(outName);

        // Чистим память wasm.
        try { await ff.deleteFile(inName); await ff.deleteFile(outName); } catch (_) {}

        const blob = new Blob([data.buffer], { type: "video/mp4" });
        const blobUrl = URL.createObjectURL(blob);
        resultVideo.src = blobUrl;
        resultWrap.classList.add("active");
        setTitle("ГОТОВО — 2007");
        setStatus("📱 " + PRESETS[currentPreset].title + " — готов! Сохрани или отправь.");

        // Прокрутка к результату.
        resultWrap.scrollIntoView({ behavior: "smooth", block: "nearest" });

        // Запоминаем blob для кнопок.
        lastBlob = blob;
        lastFileName = "shkal_" + Date.now() + ".mp4";
      } catch (err) {
        console.error(err);
        setStatus("❌ Ошибка обработки: " + (err && err.message ? err.message : err));
        setTitle("ОШИБКА");
      } finally {
        processBtn.disabled = false;
      }
    });

    function getExt(name) {
      const m = /\.([a-z0-9]{2,4})$/i.exec(name);
      return m ? "." + m[1].toLowerCase() : ".mp4";
    }

    // ── Скачать / поделиться / ещё раз ────────────────────────
    let lastBlob = null, lastFileName = "shkal.mp4";

    downloadBtn.addEventListener("click", () => {
      if (!lastBlob) return;
      const a = document.createElement("a");
      a.href = URL.createObjectURL(lastBlob);
      a.download = lastFileName;
      document.body.appendChild(a);
      a.click();
      a.remove();
    });

    shareBtn.addEventListener("click", async () => {
      if (!lastBlob) return;
      const file = new File([lastBlob], lastFileName, { type: "video/mp4" });
      // Web Share API с файлами — открывает системную шеринговую панель
      // (можно выбрать Telegram → отправить в чат/контакту). Поддерживается не везде.
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({ files: [file], title: "Шакал 2007", text: "📱 2007 позвонил..." });
          return;
        } catch (e) {
          if (e && e.name === "AbortError") return; // пользователь отменил
        }
      }
      // tg.sendData не передаёт файлы (>4096 байт) — это ограничение Telegram.
      // Поэтому предлагаем просто скачать и переслать вручную.
      setStatus("📤 Прямая отправка файла из Mini App невозможна. 👇 Нажми «Скачать», затем перешли видео в чат вручную.");
      downloadBtn.click();
    });

    againBtn.addEventListener("click", () => {
      resultWrap.classList.remove("active");
      progressWrap.classList.remove("active");
      setProgress(0);
      setTitle("ВЕРНИСЬ В 2007-Й");
      setStatus("Выбери новое видео");
      selectedFile = null;
      fileInput.value = "";
      filenameEl.textContent = "—";
      processBtn.disabled = true;
    });

    // Подсказка по времени обработки в зависимости от длительности.
    // (не блокируем, просто информируем)
    fileInput.addEventListener && null;
  })();
  </script>
</body>
</html>
