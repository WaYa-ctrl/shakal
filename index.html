<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>📱 Вернись в 2007-й</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: "Courier New", "Lucida Console", monospace;
      background: linear-gradient(160deg, #0a1929 0%, #0f2a3f 55%, #0a1929 100%);
      color: #cfe8ff;
      min-height: 100%;
      display: flex;
      justify-content: center;
      padding: 14px 12px 28px;
      overflow-x: hidden;
    }

    .phone {
      width: 100%;
      max-width: 420px;
      background: linear-gradient(180deg, #3a4654 0%, #232c36 100%);
      border-radius: 22px;
      padding: 14px;
      box-shadow: 0 18px 40px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.12);
      border: 1px solid #4a5664;
    }

    .brand {
      text-align: center; font-size: 11px; letter-spacing: 3px;
      color: #9fb2c4; margin-bottom: 10px; text-transform: uppercase;
    }

    .screen {
      background: #0c1a0c; border: 4px solid #1a2a1a; border-radius: 10px;
      padding: 14px; box-shadow: inset 0 0 22px rgba(0,0,0,.7), inset 0 0 0 2px #0a130a;
      min-height: 120px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px;
    }
    .lcd-title {
      color: #7CFC00; font-size: 15px; text-shadow: 0 0 6px rgba(124,252,0,.55);
      text-align: center; letter-spacing: 1px;
    }
    .lcd-status {
      color: #9fe870; font-size: 12px; text-shadow: 0 0 5px rgba(124,252,0,.45);
      text-align: center; min-height: 16px; line-height: 1.4;
    }
    .lcd-signal {
      display: flex; justify-content: space-between; color: #4a7a3a; font-size: 10px;
      border-top: 1px dashed #2a4a2a; padding-top: 6px; margin-top: auto;
    }

    .progress-wrap { display: none; flex-direction: column; gap: 5px; margin-top: 4px; }
    .progress-wrap.active { display: flex; }
    .progress-bar { height: 14px; border: 1px solid #2a4a2a; background: #06100a; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; background: repeating-linear-gradient(45deg, #7CFC00 0 6px, #5fd400 6px 12px); transition: width .25s linear; }
    .progress-pct { color: #9fe870; font-size: 11px; text-align: center; }

    .btn {
      width: 100%; display: block; border: none; cursor: pointer; font-family: inherit;
      font-weight: bold; padding: 14px 12px; border-radius: 10px; font-size: 14px;
      letter-spacing: .5px; transition: transform .05s ease, filter .15s ease;
      background: linear-gradient(180deg, #2c6fb0 0%, #124b8c 100%); color: #fff;
      box-shadow: 0 3px 0 #0a3361, 0 6px 14px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.25);
      text-align: center;
    }
    .btn:active { transform: translateY(3px); box-shadow: 0 0 0 #0a3361, 0 2px 6px rgba(0,0,0,.4); }
    .btn:disabled { filter: grayscale(.7) brightness(.6); cursor: not-allowed; box-shadow: none; transform: none; }
    .btn.secondary { background: linear-gradient(180deg,#4a5664 0%,#2c3640 100%); box-shadow: 0 3px 0 #1a232c, 0 6px 14px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.2); }
    .btn.amber { background: linear-gradient(180deg,#ff9d2e 0%,#e0701a 100%); box-shadow: 0 3px 0 #9c4a0c, 0 6px 14px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.3); }

    .input-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    
    .presets { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin-bottom: 14px; }
    .preset {
      border: 2px solid #3a4654; background: #1a232c; color: #9fb2c4;
      font-family: inherit; font-size: 11px; font-weight: bold;
      padding: 10px 4px; border-radius: 8px; cursor: pointer; line-height: 1.3;
      transition: all .15s ease;
    }
    .preset small { display:block; font-weight:normal; opacity:.7; font-size:9px; margin-top:3px;}
    .preset.active { border-color: #7CFC00; color: #7CFC00; background: #0c1a0c; box-shadow: 0 0 10px rgba(124,252,0,.25);}

    .filename { font-size: 11px; color: #9fb2c4; text-align:center; word-break: break-all; margin-bottom: 10px; min-height: 14px;}
    .result-wrap { display:none; margin-top: 14px; }
    .result-wrap.active { display:block; }
    
    .result-video, .result-image {
      width: 100%; border-radius: 10px; border: 3px solid #4a5664; background:#000;
      box-shadow: inset 0 0 20px rgba(0,0,0,.7); display: none;
    }
    
    .result-actions { display:grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .warn { font-size: 10px; color: #ffb380; text-align:center; margin-top: 12px; line-height: 1.4;}
    .hidden-input { display: none; }
    .spinner { display:inline-block; width:12px; height:12px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right:6px;}
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="phone">
    <div class="brand">📱 SHAKAL · 2007 EDITION</div>

    <div class="screen">
      <div class="lcd-title" id="lcdTitle">ВЫБЕРИ СТИЛЬ</div>
      <div class="lcd-status" id="lcdStatus">Загрузи фото или видео для обработки</div>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-pct" id="progressPct">0%</div>
      </div>
      <div class="lcd-signal">
        <span>🔋 ●●●○○</span>
        <span id="lcdClock">--:--</span>
        <span>📶 TMA</span>
      </div>
    </div>

    <div class="presets">
      <button class="preset active" data-preset="q_2007">📱 2007<small>176×144</small></button>
      <button class="preset" data-preset="q_2010">📺 2010<small>320×240</small></button>
      <button class="preset" data-preset="q_2012">📱 S-2012<small>360×640</small></button>
      <button class="preset" data-preset="q_phonk">🌃 Phonk<small>480×640</small></button>
    </div>

    <div class="filename" id="filename">—</div>

    <input type="file" id="fileInput" class="hidden-input" accept="video/*, image/*" />
    <input type="file" id="cameraInput" class="hidden-input" accept="video/*, image/*" capture="environment" />
    
    <div class="input-wrap">
      <label for="fileInput" class="btn secondary">📁 Галерея</label>
      <label for="cameraInput" class="btn secondary">📸 Камера</label>
    </div>
    
    <button class="btn amber" id="processBtn" disabled style="margin-top:0;">🔧 Обработать</button>

    <div class="result-wrap" id="resultWrap">
      <video class="result-video" id="resultVideo" autoplay loop muted playsinline controls></video>
      <img class="result-image" id="resultImage" />
      <div class="result-actions">
        <button class="btn" id="downloadBtn">💾 Скачать</button>
        <button class="btn secondary" id="shareBtn">📤 В чат</button>
      </div>
      <button class="btn secondary" id="againBtn" style="margin-top:10px;">🔄 Ещё раз</button>
    </div>

    <div class="warn" id="warn">
      ⚠️ Первая обработка грузит движок (~25 МБ). Телефон делает всю работу сам, без серверов.
    </div>
  </div>

  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>
  <script src="https://unpkg.com/@ffmpeg/util@0.12.10/dist/umd/index.js"></script>

  <script>
  (function () {
    "use strict";

    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
    if (tg) { tg.expand(); tg.ready && tg.ready(); }

    function tick() {
      const d = new Date();
      const z = n => String(n).padStart(2, "0");
      const el = document.getElementById("lcdClock");
      if (el) el.textContent = z(d.getHours()) + ":" + z(d.getMinutes());
    }
    tick(); setInterval(tick, 30000);

    const $ = id => document.getElementById(id);
    const lcdStatus = $("lcdStatus"), lcdTitle = $("lcdTitle");
    const progressWrap = $("progressWrap"), progressFill = $("progressFill"), progressPct = $("progressPct");
    const processBtn = $("processBtn"), filenameEl = $("filename");
    const resultWrap = $("resultWrap"), resultVideo = $("resultVideo"), resultImage = $("resultImage");
    const downloadBtn = $("downloadBtn"), shareBtn = $("shareBtn"), againBtn = $("againBtn");

    function setStatus(t) { lcdStatus.innerHTML = t; }
    function setTitle(t) { lcdTitle.textContent = t; }
    function setProgress(p) {
      const pct = Math.max(0, Math.min(100, Math.round(p * 100)));
      progressFill.style.width = pct + "%";
      progressPct.textContent = pct + "%";
    }

    const PRESETS = {
      q_2007: {
        title: "📱 2007",
        args: ["-vf", "scale=176:144:flags=neighbor,eq=contrast=1.4:brightness=0.15:saturation=1.6,noise=c0s=30:c1s=40:allf=t",
               "-r", "10", "-c:v", "libx264", "-b:v", "70k", "-preset", "veryfast", "-pix_fmt", "yuv420p",
               "-ac", "1", "-ar", "8000", "-c:a", "aac", "-b:a", "16k"]
      },
      q_2010: {
        title: "📺 2010",
        args: ["-vf", "scale=320:240:flags=neighbor,eq=contrast=1.25:brightness=0.1:saturation=1.4,noise=c0s=20:c1s=25:allf=t",
               "-r", "15", "-c:v", "libx264", "-b:v", "150k", "-preset", "veryfast", "-pix_fmt", "yuv420p",
               "-ac", "1", "-ar", "8000", "-c:a", "aac", "-b:a", "24k"]
      },
      q_2012: {
        title: "📱 S-2012",
        args: ["-vf", "scale=360:640,eq=contrast=1.3:brightness=0.25:gamma=1.5:saturation=1.4,noise=c0s=10",
               "-r", "24", "-c:v", "libx264", "-b:v", "250k", "-preset", "veryfast", "-pix_fmt", "yuv420p",
               "-ac", "1", "-ar", "8000", "-c:a", "aac", "-b:a", "24k"]
      },
      q_phonk: {
        title: "🌃 Phonk",
        args: ["-vf", "scale=480:640,eq=contrast=1.2:brightness=0.02:saturation=1.1:gamma_r=1.05:gamma_g=1.1:gamma_b=0.9,unsharp=5:5:0.8,noise=c0s=20:c1s=10:allf=t",
               "-r", "24", "-c:v", "libx264", "-b:v", "250k", "-preset", "veryfast", "-pix_fmt", "yuv420p",
               "-ac", "1", "-ar", "8000", "-c:a", "aac", "-b:a", "24k"]
      }
    };
    let currentPreset = "q_2007";

    document.querySelectorAll(".preset").forEach(b => {
      b.addEventListener("click", () => {
        document.querySelectorAll(".preset").forEach(x => x.classList.remove("active"));
        b.classList.add("active");
        currentPreset = b.dataset.preset;
      });
    });

    const { FFmpeg } = FFmpegWASM;
    const { toBlobURL, fetchFile } = FFmpegUtil;
    let ffmpeg = null;
    let ffmpegReady = false;

    async function ensureFFmpeg() {
      if (ffmpegReady) return ffmpeg;
      setStatus('<span class="spinner"></span>Загружаю движок (~25 МБ)...');
      processBtn.disabled = true;
      ffmpeg = new FFmpeg();
      ffmpeg.on("log", ({ message }) => {
        if (message && message.length < 60) setStatus("⚙️ " + message);
      });
      const CORE = "https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd";
      await ffmpeg.load({
        coreURL: await toBlobURL(`${CORE}/ffmpeg-core.js`, "text/javascript"),
        wasmURL: await toBlobURL(`${CORE}/ffmpeg-core.wasm`, "application/wasm")
      });
      ffmpegReady = true;
      return ffmpeg;
    }

    let selectedFile = null;
    let isImage = false;

    const handleFileSelect = (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;

      if (file.size > 100 * 1024 * 1024) {
        setStatus("❌ Файл слишком большой (лимит 100 МБ).");
        return;
      }

      selectedFile = file;
      isImage = file.type.startsWith("image/");
      const mb = (file.size / (1024 * 1024)).toFixed(1);
      
      filenameEl.textContent = (isImage ? "🖼️ " : "🎬 ") + file.name + "  ·  " + mb + " МБ";
      processBtn.disabled = false;
      resultWrap.classList.remove("active");
      setStatus("Готово к обработке. Жми кнопку 🔧");
    };

    $("fileInput").addEventListener("change", handleFileSelect);
    $("cameraInput").addEventListener("change", handleFileSelect);

    processBtn.addEventListener("click", async () => {
      if (!selectedFile) return;
      resultWrap.classList.remove("active");
      progressWrap.classList.add("active");
      setProgress(0);
      setTitle("ОБРАБОТКА");

      try {
        const ff = await ensureFFmpeg();

        setStatus("📥 Читаю файл...");
        const ext = /\.([a-z0-9]+)$/i.exec(selectedFile.name);
        const inName = "input" + (ext ? "." + ext[1].toLowerCase() : (isImage ? ".jpg" : ".mp4"));
        const outName = isImage ? "output.jpg" : "output.mp4";
        
        await ff.writeFile(inName, await fetchFile(selectedFile));

        const progressHandler = ({ progress }) => setProgress(progress);
        ff.on("progress", progressHandler);

        setStatus("⚙️ Накладываю фильтры...");

        let args = ["-i", inName];
        const presetArgs = PRESETS[currentPreset].args;
        
        if (isImage) {
          // Ищем видеофильтр в пресете
          const vfIndex = presetArgs.indexOf("-vf");
          const vfString = vfIndex !== -1 ? presetArgs[vfIndex + 1] : "";
          args.push("-vf", vfString, "-frames:v", "1");
        } else {
          args = args.concat(presetArgs);
        }
        
        args.push(outName);
        await ff.exec(args);

        ff.off("progress", progressHandler);
        setProgress(1);

        setStatus("📦 Сохраняю...");
        const data = await ff.readFile(outName);

        try { await ff.deleteFile(inName); await ff.deleteFile(outName); } catch (_) {}

        const mime = isImage ? "image/jpeg" : "video/mp4";
        const blob = new Blob([data.buffer], { type: mime });
        const blobUrl = URL.createObjectURL(blob);
        
        if (isImage) {
          resultVideo.style.display = "none";
          resultVideo.src = "";
          resultImage.style.display = "block";
          resultImage.src = blobUrl;
        } else {
          resultImage.style.display = "none";
          resultImage.src = "";
          resultVideo.style.display = "block";
          resultVideo.src = blobUrl;
        }
        
        resultWrap.classList.add("active");
        setTitle("ГОТОВО");
        setStatus((isImage ? "🖼️ " : "📱 ") + PRESETS[currentPreset].title + " — готово!");

        resultWrap.scrollIntoView({ behavior: "smooth", block: "nearest" });

        lastBlob = blob;
        lastFileName = isImage ? "shkal_" + Date.now() + ".jpg" : "shkal_" + Date.now() + ".mp4";
      } catch (err) {
        console.error(err);
        setStatus("❌ Ошибка: " + (err && err.message ? err.message : err));
        setTitle("ОШИБКА");
      } finally {
        processBtn.disabled = false;
      }
    });

    let lastBlob = null, lastFileName = "";

    downloadBtn.addEventListener("click", () => {
      if (!lastBlob) return;
      const a = document.createElement("a");
      a.href = URL.createObjectURL(lastBlob);
      a.download = lastFileName;
      document.body.appendChild(a);
      a.click();
      a.remove();
    });

    shareBtn.addEventListener("click", async () => {
      if (!lastBlob) return;
      const file = new File([lastBlob], lastFileName, { type: lastBlob.type });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({ files: [file], title: "Шакал", text: "Стиль: " + PRESETS[currentPreset].title });
          return;
        } catch (e) {
          if (e && e.name === "AbortError") return; 
        }
      }
      setStatus("📤 Нажми «Скачать», затем отправь файл в чат вручную.");
      downloadBtn.click();
    });

    againBtn.addEventListener("click", () => {
      resultWrap.classList.remove("active");
      progressWrap.classList.remove("active");
      setProgress(0);
      setTitle("ВЫБЕРИ СТИЛЬ");
      setStatus("Загрузи фото или видео для обработки");
      selectedFile = null;
      isImage = false;
      $("fileInput").value = "";
      $("cameraInput").value = "";
      filenameEl.textContent = "—";
      processBtn.disabled = true;
    });

  })();
  </script>
</body>
</html>
